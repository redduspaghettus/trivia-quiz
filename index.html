<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekly Trivia Quiz</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #16213e;
      --border: #2a2a4a;
      --text: #f0f0ff;
      --muted: #8888aa;
      --accent: #7c3aed;
      --accent2: #ec4899;
      --grad: linear-gradient(135deg, #7c3aed, #ec4899);
      --grad-soft: linear-gradient(135deg, rgba(124,58,237,0.15), rgba(236,72,153,0.15));
      --green: #10b981;
      --green-bg: rgba(16,185,129,0.12);
      --red: #f43f5e;
      --red-bg: rgba(244,63,94,0.12);
      --radius: 16px;
      --shadow: 0 2px 8px rgba(0,0,0,0.4);
      --shadow-md: 0 8px 24px rgba(0,0,0,0.5);
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 1rem 5rem;
    }

    /* Hero header */
    .hero {
      width: 100%;
      background: var(--grad);
      padding: 2.5rem 1rem 3.5rem;
      text-align: center;
      margin-bottom: -1.5rem;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Ccircle cx='30' cy='30' r='2'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .hero h1 {
      font-size: 2.25rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: white;
      position: relative;
    }
    .hero p {
      color: rgba(255,255,255,0.75);
      font-size: 0.9rem;
      font-weight: 500;
      margin-top: 0.4rem;
      position: relative;
    }

    /* Sticky score bar */
    .score-bar {
      position: sticky;
      top: 0.75rem;
      z-index: 10;
      width: 100%;
      max-width: 700px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.25rem;
      border-radius: var(--radius);
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(12px);
    }
    .score-info { display: flex; flex-direction: column; gap: 0.1rem; }
    .score-label { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
    .score-count { font-size: 1.4rem; font-weight: 800; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .score-progress {
      flex: 1;
      margin: 0 1.25rem;
      height: 8px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .score-progress-fill {
      height: 100%;
      background: var(--grad);
      border-radius: 99px;
      transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    }
    .reset-btn {
      padding: 0.5rem 1.1rem;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.8rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .reset-btn:hover { border-color: var(--accent2); color: var(--accent2); }

    /* Questions */
    .questions-list {
      width: 100%;
      max-width: 700px;
      display: flex;
      flex-direction: column;
      gap: 0.875rem;
    }

    .q-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.375rem;
      box-shadow: var(--shadow);
      transition: border-color 0.25s, background 0.25s, transform 0.15s;
    }
    .q-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .q-card.is-correct {
      border-color: var(--green);
      background: var(--green-bg);
    }
    .q-card.is-wrong {
      border-color: var(--red);
      background: var(--red-bg);
    }

    .q-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 1.1rem;
    }
    .q-meta { display: flex; flex-direction: column; gap: 0.35rem; flex: 1; }
    .q-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: var(--grad);
      font-size: 0.7rem;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
      margin-bottom: 0.4rem;
    }
    .q-text {
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.55;
      color: var(--text);
    }

    /* Checkbox */
    .check-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
      flex-shrink: 0;
    }
    .check-label {
      font-size: 0.6rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    .check-wrap input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 30px;
      height: 30px;
      border: 2px solid var(--border);
      border-radius: 9px;
      background: var(--bg);
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .check-wrap input[type="checkbox"]:hover { border-color: var(--green); box-shadow: 0 0 0 3px rgba(16,185,129,0.15); }
    .check-wrap input[type="checkbox"]:checked { background: var(--green); border-color: var(--green); box-shadow: 0 0 0 3px rgba(16,185,129,0.2); }
    .check-wrap input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 8px;
      top: 4px;
      width: 7px;
      height: 12px;
      border: 2.5px solid white;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    /* Answer input */
    .answer-area { display: flex; gap: 0.5rem; align-items: center; }
    .text-input {
      flex: 1;
      padding: 0.65rem 1rem;
      font-size: 0.9rem;
      font-family: inherit;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .text-input::placeholder { color: var(--muted); }
    .text-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,58,237,0.2); }
    .text-input:disabled { color: var(--muted); }
    .submit-btn {
      padding: 0.65rem 1.1rem;
      background: var(--grad);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 0.875rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .submit-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .submit-btn:disabled { opacity: 0.4; cursor: default; transform: none; }

    /* Multiple choice */
    .options { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
    @media (max-width: 480px) { .options { grid-template-columns: 1fr; } }
    .option-btn {
      padding: 0.65rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      cursor: pointer;
      font-size: 0.875rem;
      font-family: inherit;
      font-weight: 500;
      text-align: left;
      transition: all 0.15s;
      color: var(--text);
    }
    .option-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(124,58,237,0.1); color: white; }
    .option-btn.correct { border-color: var(--green); background: var(--green-bg); color: var(--green); font-weight: 600; }
    .option-btn.wrong { border-color: var(--red); background: var(--red-bg); color: var(--red); }
    .option-btn:disabled { cursor: default; }

    /* Feedback */
    .feedback-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }
    .feedback-text { font-size: 0.875rem; font-weight: 600; }
    .feedback-text.correct { color: var(--green); }
    .feedback-text.wrong { color: var(--red); }
    .q-reset-btn {
      font-size: 0.75rem;
      font-family: inherit;
      font-weight: 600;
      padding: 0.3rem 0.75rem;
      border-radius: 7px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      transition: all 0.15s;
    }
    .q-reset-btn:hover { border-color: var(--accent2); color: var(--accent2); }

    /* Archive */
    .archive { max-width: 700px; width: 100%; margin-top: 2.5rem; }
    .archive h2 { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 0.75rem; }
    .archive-list { list-style: none; display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .archive-list a {
      padding: 0.35rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      text-decoration: none;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 500;
      background: var(--surface);
      transition: all 0.15s;
    }
    .archive-list a:hover { border-color: var(--accent); color: var(--accent); }
    .archive-list a.active { border-color: var(--accent); color: var(--accent); background: rgba(124,58,237,0.1); }

    .error { color: var(--red); text-align: center; padding: 2rem; font-size: 0.9rem; }
    .loading { text-align: center; color: var(--muted); padding: 3rem; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="hero">
    <h1>The Quiz</h1>
    <p id="subtitle">Weekly General Knowledge</p>
  </div>

  <div class="score-bar" id="score-bar" style="display:none;">
    <div class="score-info">
      <span class="score-label">Score</span>
      <span class="score-count" id="score-count">0 / 0</span>
    </div>
    <div class="score-progress">
      <div class="score-progress-fill" id="score-progress-fill" style="width:0%"></div>
    </div>
    <button class="reset-btn" onclick="resetQuiz()">Reset all</button>
  </div>

  <div class="questions-list" id="questions-list">
    <p class="loading">Loading quiz...</p>
  </div>

  <div class="archive" id="archive-section" style="display:none;">
    <h2>Past Quizzes</h2>
    <ul class="archive-list" id="archive-list"></ul>
  </div>

  <script>
    let quiz = null;
    // answers[i] = null | { correct: bool }
    let answers = [];

    // ---- Utilities ----
    function getWeekLabel(date) {
      const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
      const dayOfWeek = d.getUTCDay() || 7;
      d.setUTCDate(d.getUTCDate() + 4 - dayOfWeek);
      const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
      const week = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
      return `${d.getUTCFullYear()}-W${String(week).padStart(2, '0')}`;
    }

    function normalise(str) {
      return str.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
    }

    function isCorrect(userAnswer, correctAnswer) {
      return normalise(userAnswer) === normalise(correctAnswer);
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // ---- Score ----
    function updateScoreBar() {
      const answered = answers.filter(a => a !== null).length;
      const correct = answers.filter(a => a && a.correct).length;
      const total = quiz ? quiz.questions.length : 0;
      document.getElementById('score-count').textContent = `${correct} / ${answered}`;
      const pct = total > 0 ? (correct / total) * 100 : 0;
      document.getElementById('score-progress-fill').style.width = pct + '%';
    }

    // ---- Per-question logic ----
    function checkboxChanged(idx) {
      const cb = document.getElementById(`cb-${idx}`);
      answers[idx] = { correct: cb.checked };
      updateScoreBar();
      updateFeedback(idx);
    }

    function submitText(idx, answer) {
      const input = document.getElementById(`input-${idx}`);
      if (!input || !input.value.trim()) return;
      const correct = isCorrect(input.value, answer);
      input.disabled = true;
      document.getElementById(`submit-${idx}`).disabled = true;
      // Auto-set checkbox to match
      const cb = document.getElementById(`cb-${idx}`);
      cb.checked = correct;
      answers[idx] = { correct };
      updateScoreBar();
      updateFeedback(idx);
    }

    function submitMC(idx, chosen, answer) {
      if (answers[idx] !== null) return;
      const correct = isCorrect(chosen, answer);
      // Lock buttons and highlight
      const card = document.getElementById(`card-${idx}`);
      card.querySelectorAll('.option-btn').forEach(btn => {
        btn.disabled = true;
        if (isCorrect(btn.textContent, answer)) btn.classList.add('correct');
        else if (btn.textContent.trim() === chosen && !correct) btn.classList.add('wrong');
      });
      const cb = document.getElementById(`cb-${idx}`);
      cb.checked = correct;
      answers[idx] = { correct };
      updateScoreBar();
      updateFeedback(idx);
    }

    function resetQuestion(idx) {
      answers[idx] = null;
      const card = document.getElementById(`card-${idx}`);
      const q = quiz.questions[idx];
      // Uncheck checkbox
      document.getElementById(`cb-${idx}`).checked = false;
      // Re-enable inputs
      if (q.type === 'open_text') {
        const input = document.getElementById(`input-${idx}`);
        if (input) { input.disabled = false; input.value = ''; }
        const submitBtn = document.getElementById(`submit-${idx}`);
        if (submitBtn) submitBtn.disabled = false;
      } else {
        card.querySelectorAll('.option-btn').forEach(btn => {
          btn.disabled = false;
          btn.classList.remove('correct', 'wrong');
        });
      }
      card.className = 'q-card';
      const feedbackRow = card.querySelector('.feedback-row');
      if (feedbackRow) feedbackRow.remove();
      updateScoreBar();
    }

    function updateFeedback(idx) {
      const a = answers[idx];
      const q = quiz.questions[idx];
      const card = document.getElementById(`card-${idx}`);

      card.className = 'q-card' + (a === null ? '' : a.correct ? ' is-correct' : ' is-wrong');

      let feedbackRow = card.querySelector('.feedback-row');
      if (a === null) {
        if (feedbackRow) feedbackRow.remove();
        return;
      }
      if (!feedbackRow) {
        feedbackRow = document.createElement('div');
        feedbackRow.className = 'feedback-row';
        card.appendChild(feedbackRow);
      }
      feedbackRow.innerHTML = `
        <span class="feedback-text ${a.correct ? 'correct' : 'wrong'}">
          ${a.correct ? 'Correct' : `Answer: <strong>${esc(q.answer)}</strong>`}
        </span>
        <button class="q-reset-btn" onclick="resetQuestion(${idx})">Reset</button>
      `;
    }

    // ---- Render ----
    function renderQuiz() {
      answers = new Array(quiz.questions.length).fill(null);
      const list = document.getElementById('questions-list');

      list.innerHTML = quiz.questions.map((q, idx) => {
        let inputHtml = '';
        if (q.type === 'multiple_choice') {
          inputHtml = `<div class="options">
            ${q.options.map(o => `<button class="option-btn" onclick="submitMC(${idx}, '${esc(o)}', '${esc(q.answer)}')">${esc(o)}</button>`).join('')}
          </div>`;
        } else {
          inputHtml = `<div class="answer-area">
            <input class="text-input" id="input-${idx}" type="text" placeholder="Type answer..."
              onkeydown="if(event.key==='Enter') submitText(${idx}, '${esc(q.answer)}')">
            <button class="submit-btn" id="submit-${idx}" onclick="submitText(${idx}, '${esc(q.answer)}')">Check</button>
          </div>`;
        }

        return `<div class="q-card" id="card-${idx}">
          <div class="q-header">
            <div class="q-meta">
              <span class="q-number">Q${idx + 1}</span>
              <span class="q-text">${esc(q.question)}</span>
            </div>
            <div class="check-wrap">
              <span class="check-label">Got it</span>
              <input type="checkbox" id="cb-${idx}" onchange="checkboxChanged(${idx})">
            </div>
          </div>
          ${inputHtml}
        </div>`;
      }).join('');

      document.getElementById('score-bar').style.display = 'flex';
      updateScoreBar();
    }

    function resetQuiz() {
      quiz.questions.forEach((_, idx) => {
        if (answers[idx] !== null) resetQuestion(idx);
      });
    }

    // ---- Data ----
    async function loadManifest() {
      try {
        const r = await fetch('quizzes/manifest.json');
        if (!r.ok) return [];
        return await r.json();
      } catch { return []; }
    }

    async function loadQuiz(week) {
      const r = await fetch(`quizzes/${week}.json`);
      if (!r.ok) throw new Error(`Quiz not found: ${week}`);
      return await r.json();
    }

    function renderArchive(weeks, activeWeek) {
      const section = document.getElementById('archive-section');
      if (weeks.length <= 1) return;
      section.style.display = 'block';
      document.getElementById('archive-list').innerHTML = weeks.map(w =>
        `<li><a href="#" class="${w === activeWeek ? 'active' : ''}" onclick="switchQuiz('${w}'); return false;">${w}</a></li>`
      ).join('');
    }

    async function switchQuiz(week) {
      document.getElementById('questions-list').innerHTML = '<p class="loading">Loading...</p>';
      document.getElementById('score-bar').style.display = 'none';
      try {
        quiz = await loadQuiz(week);
        document.getElementById('subtitle').textContent = `Week ${week}`;
        renderQuiz();
        document.querySelectorAll('.archive-list a').forEach(a => {
          a.classList.toggle('active', a.textContent === week);
        });
      } catch (e) {
        document.getElementById('questions-list').innerHTML =
          `<div class="error">Failed to load quiz: ${esc(e.message)}</div>`;
      }
    }

    async function init() {
      try {
        const weeks = await loadManifest();
        const thisWeek = getWeekLabel(new Date());
        const targetWeek = weeks.includes(thisWeek) ? thisWeek : (weeks[0] || thisWeek);
        quiz = await loadQuiz(targetWeek);
        document.getElementById('subtitle').textContent = `Week ${targetWeek}`;
        renderQuiz();
        renderArchive(weeks, targetWeek);
      } catch (e) {
        document.getElementById('questions-list').innerHTML =
          `<div class="error">No quiz available yet. Check back on Friday!<br><small>${esc(e.message)}</small></div>`;
      }
    }

    init();
  </script>
</body>
</html>
